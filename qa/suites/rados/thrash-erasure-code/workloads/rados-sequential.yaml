# Sequential RADOS workload (no pool configuration)
# Pool configuration comes from erasure-code directory
tasks:
  - rados:
      use-pool-config: true
      clients: [client.0]
      ops: 4000
      objects: 50
      write_append_excl: false
      max_seconds: 1200
      op_weights:
        read: 100
        write: 100
        delete: 50
  - print: "**** done rados ec sequential"