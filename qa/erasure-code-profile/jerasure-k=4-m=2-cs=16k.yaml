# Jerasure plugin with k=4, m=2, chunk_size=16k
overrides:
  ceph:
    pool-config:
      ec_pool: true
      erasure_code_profile:
        name: jerasure42profile
        plugin: jerasure
        k: 4
        m: 2
        technique: reed_sol_van
        crush-failure-domain: host
        crush-osds-per-failure-domain: 2
        crush-num-failure-domains: 3
        chunk_size: 16384
